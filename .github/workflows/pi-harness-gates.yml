name: pi-harness-gates

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run harness:bootstrap
      - run: npm run gates
      - run: npm run smoke:live -- all --dry-run --json
      - run: npm run package:harness -- doctor --json
